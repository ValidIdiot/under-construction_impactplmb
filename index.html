<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Impact Plumbing Inc. | Under Construction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        html,
        body {
            height: 100%;
        }

        body {
            background: #0b0f1a;
            color: #fff;
            overflow: hidden;
        }

        .navbar {
            background: rgba(10, 12, 20, 0.65) !important;
            backdrop-filter: blur(10px);
            position: absolute;
            width: 100%;
            z-index: 10;
        }

        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;

            background-image: url("https://images.unsplash.com/photo-1506606401543-2e73709cebb4?q=80&w=1170&auto=format&fit=crop");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, .65);
        }

        .hero-content {
            position: relative;
            z-index: 2;
            max-width: 700px;
            padding: 20px;
        }

        .hero-content img.logo {
            height: 140px;
            margin-bottom: 1.5rem;
        }

        .construction-badge {
            display: inline-block;
            padding: .45rem 1rem;
            border-radius: 50rem;
            background: rgba(253, 225, 13, 0.15);
            border: 1px solid rgba(253, 225, 13, 0.35);
            color: rgb(253, 225, 13);
            margin-bottom: 1.5rem;
            letter-spacing: .08em;
            text-transform: uppercase;
            font-size: .8rem;
            font-weight: 600;
            text-shadow: rgba(255,255,255,1) 0px 0px 27px;
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
        }

        p {
            font-size: 1.15rem;
            opacity: .9;
            margin: 1.5rem auto 2rem;
        }

        .footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            opacity: .7;
            font-size: .9rem;
            z-index: 2;
        }

        @media (max-width:768px) {
            .hero {
                background-attachment: scroll;
            }

            h1 {
                font-size: 2.2rem;
            }

            .hero-content img.logo {
                height: 100px;
            }
        }
        .construction-bg {
            position: absolute;
            inset: 0;
            overflow: hidden;
            z-index: 1;
        }

        .tape {
            position: absolute;
            left: -20%;
            width: 140%;
            height: 70px;

            background:
                repeating-linear-gradient(
                    -45deg,
                    #ffd000 0px,
                    #ffd000 28px,
                    #111 28px,
                    #111 56px
                );

            border-top: 3px solid rgba(255,255,255,.15);
            border-bottom: 3px solid rgba(0,0,0,.35);

            opacity: .18;
            /* transition: cubic-bezier(0.075, 0.82, 0.165, 1) 5s; */
            animation: pulse 4s ease-in-out infinite;
            
        }
        @keyframes pulse {
            0%, 100% {
                opacity: .18;
            }
            50% {
                opacity: .30;
            }
        }

        /* .tape:hover {
            opacity: .25;
        } */

        .tape-1 {
            top: 18%;
            transform: rotate(-12deg);
        }

        .tape-2 {
            top: 50%;
            transform: rotate(8deg);
        }

        .tape-3 {
            top: 78%;
            transform: rotate(-7deg);
        }

        .link {
            position: relative;
            display: inline-block;
            text-decoration: none;
        }

        .link::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -4px;

            width: 100%;
            height: 1px;
            background: rgb(253, 225, 13);
            

            transform: scaleX(0);
            transform-origin: left;   /* hidden from the left */
            transition: transform .3s ease;
        }

        /* Show: grows left -> right */
        .construction-badge:hover .link::after {
            transform: scaleX(1);
            transform-origin: left;
        }

        /* Hide: shrinks left -> right */
        .construction-badge:not(:hover) .link::after {
            transform: scaleX(0);
            transform-origin: right;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">

            <a class="navbar-brand" href="/">
                <img src="assets/logo-white.svg"
                    style="height:70px; margin-right:20px;"
                    alt="Impact Plumbing Inc.">
            </a>

        </div>
    </nav>

    <main class="hero">
        <div class="construction-bg">
            <div class="tape tape-1"></div>
            <div class="tape tape-2"></div>
            <div class="tape tape-3"></div>
        </div>

        <div class="hero-content">

            <img src="assets/logo-impact.svg"
                class="logo"
                alt="Impact Plumbing Inc.">

            <div class="construction-badge">
                <span class="link">Website Under Construction</span>
            </div>

            <p>
                We are still working on the website.
                <br>
                If you are looking to schedule an appointment:
            </p>

            <a href="tel:+17182392074" class="btn btn-primary btn-lg px-4">
                Call Us: (718) 239-2074
            </a>

        </div>

        <div class="footer">
            © 2026 Impact Plumbing & Heating Inc. All rights reserved.
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
