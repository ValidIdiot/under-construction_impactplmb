<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Impact Plumbing Inc.</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        /* Reset and Base Layout */
html, body {
    height: 100%;
    margin: 0;
    padding: 0;
    background: #0b0f1a;
    color: #fff;
    font-family: sans-serif;
}

body {
    display: flex;
    flex-direction: column;
}

/* Navbar */
.navbar {
    background: rgba(10, 12, 20, 0.65) !important;
    backdrop-filter: blur(10px);
    width: 100%;
    position: relative;
}

/* Hero Section */
.hero {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
    padding: 40px 20px;
    background-image: url("https://images.unsplash.com/photo-1506606401543-2e73709cebb4?q=80&w=1170&auto=format&fit=crop");
    background-size: cover;
    background-position: center;
}

.hero::before {
    content: "";
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, .65);
}

.hero-content {
    position: relative;
    z-index: 2;
    max-width: 700px;
}

.hero-content img.logo {
    height: 140px;
    margin-bottom: 1.5rem;
    max-width: 100%;
}

/* Construction Elements */
.construction-badge {
    display: inline-block;
    padding: .45rem 1rem;
    border-radius: 50rem;
    background: rgba(253, 225, 13, 0.15);
    border: 1px solid rgba(253, 225, 13, 0.35);
    color: rgb(253, 225, 13);
    margin-bottom: 1.5rem;
    font-size: 0.8rem;
    text-transform: uppercase;
}

h1 { font-size: 3rem; font-weight: 700; }
p { font-size: 1.15rem; opacity: .9; margin: 1.5rem auto 2rem; }

/* Footer */
.footer {
    padding: 20px;
    text-align: center;
    opacity: .7;
    font-size: .9rem;
    background: rgba(10, 12, 20, 0.9);
    z-index: 2;
}

/* Animation Container */
.construction-bg {
    position: absolute;
    inset: 0;
    overflow: hidden;
    z-index: 1;
    pointer-events: none;
}

.tape {
    position: absolute;
    left: -10%;
    width: 120%;
    height: 70px;
    background: repeating-linear-gradient(-45deg, #ffd000 0px, #ffd000 28px, #111 28px, #111 56px);
    opacity: .18;
    animation: pulse 4s ease-in-out infinite;
}

.tape-1 { top: 18%; transform: rotate(-12deg); }
.tape-2 { top: 50%; transform: rotate(8deg); }
.tape-3 { top: 78%; transform: rotate(-7deg); }

@keyframes pulse {
    0%, 100% { opacity: .18; }
    50% { opacity: .30; }
}

/* Mobile Responsive Overrides */
@media (max-width: 768px) {
    h1 { font-size: 1.8rem; }
    .hero-content img.logo { height: 80px; }
    .tape { height: 50px; }
}
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container-fluid">

            <a class="navbar-brand" href="/">
                <img src="assets/logo-white.svg"
                    style="height:70px; margin-right:20px;"
                    alt="Impact Plumbing Inc.">
            </a>

        </div>
    </nav>

    <main class="hero">
        <div class="construction-bg">
            <div class="tape tape-1"></div>
            <div class="tape tape-2"></div>
            <div class="tape tape-3"></div>
        </div>

        <div class="hero-content">

            <img src="assets/logo-impact.svg"
                class="logo"
                alt="Impact Plumbing Inc.">

            <div class="construction-badge">
                <span class="link">Website Under Construction</span>
            </div>

            <p>
                We are still working on the website.
                <br>
                If you are looking to schedule an appointment:
            </p>

            <a href="tel:+17182392074" class="btn btn-primary btn-lg px-4">
                Call Us: (718) 239-2074
            </a>

        </div>

        <div class="footer">
            © 2026 Impact Plumbing & Heating Inc. All rights reserved.
        </div>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>

</html>
